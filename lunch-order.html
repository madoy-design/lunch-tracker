<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランチ メニュー注文</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F3EE; --surface:#FDFBF8; --surface2:#F2EDE6;
    --ink:#1C1208; --ink2:#6B5A42; --ink3:#A8947A; --border:#E2D8CC;
    --amber:#C8780A; --amber-bg:#FFF6E0; --amber-border:#F0C84A;
    --green:#2A6B45; --green-bg:#E8F5EE; --green-border:#6DC48A;
    --blue:#1A5FA8; --blue-bg:#E6F0FF; --blue-border:#7AB0F0;
    --red:#B02020; --red-bg:#FFF0F0;
    --shadow-sm:0 1px 4px rgba(28,18,8,0.08); --shadow-md:0 3px 16px rgba(28,18,8,0.10);
    --radius:14px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; padding:20px 14px 80px; }
  .page { max-width:520px; margin:0 auto; }

  /* header */
  .header { margin-bottom:20px; }
  .header h1 { font-size:22px; font-weight:900; letter-spacing:-0.02em; line-height:1.2; }
  .header p { font-size:12px; color:var(--ink3); margin-top:5px; line-height:1.7; }

  /* sync */
  #sync-status { font-size:11px; color:var(--ink3); text-align:right; min-width:80px; padding-top:4px; }

  /* join box */
  .join-box { background:var(--amber-bg); border:1.5px solid var(--amber-border); border-radius:var(--radius); padding:16px; margin-bottom:18px; }
  .join-box-title { font-size:11px; font-weight:700; color:#9A6800; margin-bottom:8px; }
  .join-row { display:flex; gap:8px; }
  .join-input { flex:1; background:#fff; border:1.5px solid var(--amber-border); border-radius:8px; padding:9px 12px; font-size:13px; outline:none; font-family:'Noto Sans JP',sans-serif; }
  .join-btn { padding:9px 16px; background:var(--amber); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:'Noto Sans JP',sans-serif; }

  /* section title */
  .section-title { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink2); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
  .title-bar { width:3px; height:13px; border-radius:2px; display:block; }

  /* participant list */
  .p-list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }

  .p-card { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:var(--shadow-sm); transition:border-color 0.2s; }
  .p-card.done { border-color:var(--green-border); }
  .p-card.active { border-color:var(--amber-border); box-shadow:0 0 0 3px rgba(200,120,10,0.10); }

  .p-header { display:flex; align-items:center; gap:10px; padding:13px 14px; cursor:pointer; user-select:none; }
  .p-avatar { width:34px; height:34px; border-radius:50%; background:var(--surface2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:var(--ink2); flex-shrink:0; }
  .p-card.done .p-avatar { background:var(--green-bg); border-color:var(--green-border); color:var(--green); }
  .p-card.active .p-avatar { background:var(--amber-bg); border-color:var(--amber-border); color:var(--amber); }
  .p-info { flex:1; min-width:0; }
  .p-name { font-size:15px; font-weight:700; }
  .p-sub { font-size:11px; color:var(--ink3); margin-top:2px; }
  .p-card.done .p-sub { color:var(--green); font-weight:700; }
  .p-chevron { font-size:14px; color:var(--ink3); transition:transform 0.2s; flex-shrink:0; }
  .p-card.active .p-chevron { transform:rotate(180deg); color:var(--amber); }

  /* order form (inside card) */
  .order-form { border-top:1.5px solid var(--border); padding:14px; display:none; }
  .p-card.active .order-form { display:block; }

  .form-label { font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink3); margin-bottom:6px; }

  /* menu grid */
  .menu-section { margin-bottom:14px; }
  .menu-section-label { font-size:11px; font-weight:700; color:var(--ink2); margin-bottom:7px; display:flex; align-items:center; gap:5px; }
  .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .menu-btn {
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 10px; border-radius:9px; border:1.5px solid var(--border);
    background:var(--bg); cursor:pointer; transition:all 0.15s;
    font-family:'Noto Sans JP',sans-serif; gap:6px;
  }
  .menu-btn.selected-adult { background:var(--amber-bg); border-color:var(--amber-border); }
  .menu-btn.selected-child { background:var(--green-bg); border-color:var(--green-border); }
  .menu-btn-left { display:flex; flex-direction:column; gap:1px; min-width:0; flex:1; }
  .menu-btn-name { font-size:11px; font-weight:700; color:var(--ink); line-height:1.4; }
  .menu-btn.selected-adult .menu-btn-name { color:var(--amber); }
  .menu-btn.selected-child .menu-btn-name { color:var(--green); }
  .menu-btn-price { font-family:'DM Mono',monospace; font-size:11px; color:var(--ink3); }
  .menu-qty { display:flex; align-items:center; background:var(--surface); border:1.5px solid var(--border); border-radius:7px; overflow:hidden; flex-shrink:0; }
  .qty-btn { width:26px; height:26px; border:none; background:transparent; cursor:pointer; font-size:15px; font-weight:700; color:var(--ink2); display:flex; align-items:center; justify-content:center; }
  .qty-btn:active { background:var(--border); }
  .qty-val { width:24px; text-align:center; font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--ink); border-left:1px solid var(--border); border-right:1px solid var(--border); line-height:26px; }

  /* payment select */
  .payment-section { margin-bottom:14px; }
  .payment-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .pay-opt { padding:10px 12px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); cursor:pointer; text-align:center; transition:all 0.15s; }
  .pay-opt:active { transform:scale(0.97); }
  .pay-opt.selected-cash { background:var(--amber-bg); border-color:var(--amber-border); }
  .pay-opt.selected-paypay { background:var(--blue-bg); border-color:var(--blue-border); }
  .pay-opt-icon { font-size:20px; margin-bottom:3px; }
  .pay-opt-label { font-size:12px; font-weight:700; color:var(--ink2); }
  .pay-opt.selected-cash .pay-opt-label { color:var(--amber); }
  .pay-opt.selected-paypay .pay-opt-label { color:var(--blue); }
  .pay-opt-sub { font-size:10px; color:var(--ink3); margin-top:2px; }

  /* preview */
  .preview-amt { font-size:12px; color:var(--ink3); text-align:right; margin:8px 0 12px; }
  .preview-amt span { font-family:'DM Mono',monospace; color:var(--ink); font-weight:500; }

  /* done button */
  .done-btn { width:100%; padding:13px; background:var(--ink); color:#FDF8F0; border:none; border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:0.03em; transition:opacity 0.15s; }
  .done-btn:active { opacity:0.7; }

  /* empty */
  .empty-state { text-align:center; padding:40px 20px; color:var(--ink3); font-size:13px; background:var(--surface); border:1.5px dashed var(--border); border-radius:12px; }
  .empty-state .emoji { font-size:32px; margin-bottom:10px; display:block; }

  /* modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(28,18,8,0.55); z-index:100; align-items:flex-end; justify-content:center; backdrop-filter:blur(2px); }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:20px 20px 0 0; padding:20px 18px 40px; width:100%; max-width:520px; box-shadow:0 -4px 32px rgba(28,18,8,0.18); animation:slideUp 0.25s cubic-bezier(0.4,0,0.2,1); }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
  .modal-title { font-size:17px; font-weight:900; margin-bottom:4px; }
  .modal-sub { font-size:12px; color:var(--ink3); margin-bottom:14px; }
  .share-text-box { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:14px; font-size:13px; line-height:1.9; color:var(--ink); white-space:pre-wrap; font-family:'Noto Sans JP',sans-serif; margin-bottom:14px; max-height:320px; overflow-y:auto; }
  .modal-btns { display:flex; flex-direction:column; gap:8px; }
  .copy-btn { width:100%; padding:13px; border:none; border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .copy-btn.default { background:#06C755; color:#fff; }
  .copy-btn.copied { background:var(--green); color:#fff; }
  .close-modal-btn { width:100%; padding:11px; border:1.5px solid var(--border); border-radius:10px; background:transparent; font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700; color:var(--ink3); cursor:pointer; }

  .bottom-note { text-align:center; font-size:11px; color:var(--ink3); margin-top:8px; line-height:1.8; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <h1>🍛 ランチ メニュー注文</h1>
        <p>お名前をタップして<br>メニューと決済方法を選んでください</p>
      </div>
      <div id="sync-status"></div>
    </div>

    <div id="join-box" style="display:none;margin-top:14px;">
      <div class="join-box">
        <div class="join-box-title">📋 幹事から共有されたIDを入力して参加</div>
        <div class="join-row">
          <input id="inp-bin-id" class="join-input" type="text" placeholder="BIN IDを貼り付け">
          <button class="join-btn" onclick="joinBin()">参加</button>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title">
    <span class="title-bar" style="background:var(--amber)"></span>
    参加者リスト
  </div>
  <div class="p-list" id="participant-list">
    <div class="empty-state"><span class="emoji">⏳</span>読み込み中...</div>
  </div>

  <div class="bottom-note">名前をタップしてメニューを選択してください</div>
</div>

<!-- LINE Message Modal -->
<div class="modal-overlay" id="line-modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✅ 入力完了！</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="share-text-box" id="modal-text"></div>
    <div class="modal-btns">
      <button class="copy-btn default" id="copy-btn" onclick="copyText()">
        <span>📋</span><span id="copy-label">コピーしてLINEに貼り付け</span>
      </button>
      <button class="close-modal-btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
  const MENUS = [
    { id:'ap', label:'プレーンナン',     price:890, type:'adult' },
    { id:'ac', label:'チーズナン',       price:990, type:'adult' },
    { id:'cp', label:'kidsプレーンナン', price:650, type:'child' },
    { id:'cc', label:'kidsチーズナン',   price:850, type:'child' },
  ];
  const ADULT_MENUS = MENUS.filter(m=>m.type==='adult');
  const CHILD_MENUS = MENUS.filter(m=>m.type==='child');

  const MASTER_KEY = '$2a$10$QjhIAcKNevQETXF94ZZlFeYgVFYR.gQxsu2o0g42osJy833IzXCk.';
  const _urlId = new URLSearchParams(location.search).get('id');
  let BIN_ID = _urlId || localStorage.getItem('lunch-bin-id') || null;
  if(_urlId) localStorage.setItem('lunch-bin-id', _urlId);

  let participants = [];
  let nextId = 1;
  let activeId = null;
  let orderQtys = {};   // { participantId: { ap:0, ac:0, ... } }
  let orderPay  = {};   // { participantId: 'cash'|'paypay'|null }
  let pollTimer = null;

  function makeQty() { const q={}; MENUS.forEach(m=>q[m.id]=0); return q; }
  function fmt(n) { return '¥'+n.toLocaleString('ja-JP'); }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function calcAmt(qty) { if(!qty) return 0; return MENUS.reduce((s,m)=>s+(qty[m.id]||0)*m.price,0); }
  function calcPax(qty) { if(!qty) return 0; return MENUS.reduce((s,m)=>s+(qty[m.id]||0),0); }

  function setStatus(msg,color){ const el=document.getElementById('sync-status'); if(el){el.textContent=msg;el.style.color=color||'#A8947A';} }

  /* ── JSONBin ── */
  async function load(silent) {
    if(!BIN_ID) return;
    try {
      const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':MASTER_KEY}});
      const d=await res.json();
      participants=(d.record.participants||[]).map(p=>({...p, qty:Object.assign(makeQty(),p.qty||{})}));
      nextId=d.record.nextId||1;
      if(!silent) setStatus('✓ 読み込み完了','#2A6B45');
      render();
    } catch(e){ if(!silent) setStatus('⚠ 読み込み失敗','#B02020'); }
  }

  async function save() {
    if(!BIN_ID) return;
    try {
      setStatus('💾 保存中…','#C8780A');
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
        body:JSON.stringify({participants,nextId})
      });
      setStatus('✓ 保存済','#2A6B45');
    } catch(e){ setStatus('⚠ 保存失敗','#B02020'); }
  }

  function startPolling() {
    if(pollTimer) clearInterval(pollTimer);
    pollTimer=setInterval(()=>load(true),5000);
  }

  async function joinBin() {
    const id=document.getElementById('inp-bin-id').value.trim();
    if(!id) return;
    BIN_ID=id; localStorage.setItem('lunch-bin-id',BIN_ID);
    document.getElementById('join-box').style.display='none';
    await load(false); startPolling();
  }

  /* ── Qty helpers ── */
  function getQty(pid) {
    if(!orderQtys[pid]) orderQtys[pid]=Object.assign(makeQty(), (participants.find(p=>p.id===pid)||{}).qty||{});
    return orderQtys[pid];
  }
  function getPay(pid) {
    if(orderPay[pid]===undefined) orderPay[pid]=(participants.find(p=>p.id===pid)||{}).status||null;
    // nullify 'pending' — treat as unset
    if(orderPay[pid]==='pending') orderPay[pid]=null;
    return orderPay[pid];
  }

  /* ── Toggle card ── */
  function toggleCard(pid) {
    activeId = (activeId===pid) ? null : pid;
    render();
    if(activeId!==null) {
      setTimeout(()=>{
        const card=document.querySelector(`.p-card[data-id="${pid}"]`);
        if(card) card.scrollIntoView({behavior:'smooth',block:'nearest'});
      },50);
    }
  }

  /* ── Qty change ── */
  function changeQty(pid, menuId, delta) {
    const q=getQty(pid);
    q[menuId]=Math.max(0,(q[menuId]||0)+delta);
    // update display
    const valEl=document.getElementById(`qty-${pid}-${menuId}`);
    if(valEl) valEl.textContent=q[menuId];
    const btn=document.getElementById(`mbtn-${pid}-${menuId}`);
    if(btn){
      const m=MENUS.find(x=>x.id===menuId);
      btn.className='menu-btn'+(q[menuId]>0?(m.type==='adult'?' selected-adult':' selected-child'):'');
    }
    updatePreview(pid);
  }

  /* ── Payment select ── */
  function selectPay(pid, method) {
    orderPay[pid]=method;
    ['cash','paypay'].forEach(m=>{
      const el=document.getElementById(`pay-${pid}-${m}`);
      if(el) el.className='pay-opt'+(method===m?` selected-${m}`:'');
    });
  }

  /* ── Preview ── */
  function updatePreview(pid) {
    const q=getQty(pid);
    const amt=calcAmt(q), pax=calcPax(q);
    const el=document.getElementById(`preview-${pid}`);
    if(el) el.innerHTML=pax>0?`合計: <span>${fmt(amt)}</span>（${pax}名）`:'';
  }

  /* ── Confirm order ── */
  function confirmOrder(pid) {
    const q=getQty(pid);
    const pay=getPay(pid);
    if(calcPax(q)===0){ alert('メニューを選択してください'); return; }
    if(!pay){ alert('決済方法を選択してください'); return; }

    // save into participants
    const p=participants.find(x=>x.id===pid);
    if(!p) return;
    p.qty=Object.assign({},q);
    p.status=pay;
    activeId=null;

    save().then(()=>render());
    showLineModal(pid);
  }

  /* ── LINE modal ── */
  function showLineModal(pid) {
    const p=participants.find(x=>x.id===pid);
    if(!p) return;
    const amt=calcAmt(p.qty), pax=calcPax(p.qty);
    const lines=MENUS.filter(m=>(p.qty[m.id]||0)>0)
      .map(m=>`${m.label} ×${p.qty[m.id]}　${fmt(m.price*p.qty[m.id])}`).join('\n');
    const payLabel = p.status==='cash'?'当日現金':'PayPay（事前送金）';

    const text=
`メニューの決定をありがとうございます！
当日、子どもたちの良い思い出になるようにしたいと思います。

★メニュー金額の件でお知らせです。
誠に恐れ入りますが、下記金額を
当日現金or事前にPaypayにていただけると幸いです。
※現金はおつりのないようにいただけると助かります。
※Paypayの場合は、事前に藤森個人のLINEへいただけると助かります。

【ランチ会計まとめ】
━━━━━━━━━━━
${lines}
━━━━━━━━━━━
合計　${fmt(amt)}（${pax}名）
お支払い方法：${payLabel}

■日時
3/28(土)　13：30〜15：00

■場所
タージマハル
大阪府大阪市淀川区宮原2-1-2
https://tabelog.com/osaka/A2701/A270301/27134520/

何か不明点やご都合が悪くなりましたら藤森までご連絡ください。
どうぞよろしくお願いいたします。`;

    const menuSummary=MENUS.filter(m=>(p.qty[m.id]||0)>0).map(m=>`${m.label}×${p.qty[m.id]}`).join('・');
    document.getElementById('modal-sub').textContent=`${p.name} さん　${menuSummary}　${fmt(amt)}`;
    document.getElementById('modal-text').textContent=text;
    document.getElementById('copy-label').textContent='コピーしてLINEに貼り付け';
    document.getElementById('copy-btn').className='copy-btn default';
    document.getElementById('line-modal').classList.add('open');
  }

  async function copyText() {
    const text=document.getElementById('modal-text').textContent;
    try{await navigator.clipboard.writeText(text);}
    catch{const el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}
    document.getElementById('copy-btn').className='copy-btn copied';
    document.getElementById('copy-label').textContent='コピーしました！LINEに貼り付けてください ✓';
    setTimeout(()=>{document.getElementById('copy-btn').className='copy-btn default';document.getElementById('copy-label').textContent='コピーしてLINEに貼り付け';},3000);
  }

  function closeModal(){ document.getElementById('line-modal').classList.remove('open'); }
  function closeModalOutside(e){ if(e.target===document.getElementById('line-modal')) closeModal(); }

  /* ── Render ── */
  function render() {
    const list=document.getElementById('participant-list');
    if(participants.length===0){
      list.innerHTML=`<div class="empty-state"><span class="emoji">👀</span>参加者リストが見つかりません<br><span style="font-size:11px;margin-top:6px;display:block;">幹事から共有されたIDを入力してください</span></div>`;
      return;
    }

    list.innerHTML=participants.map(p=>{
      const qty=getQty(p.id);
      const pay=getPay(p.id);
      const amt=calcAmt(qty), pax=calcPax(qty);
      const isDone = p.status && p.status!=='pending' && calcPax(p.qty||{})>0;
      const isActive = activeId===p.id;
      const initial=p.name.charAt(0);

      const adultMenuHtml=ADULT_MENUS.map(m=>{
        const q=qty[m.id]||0;
        const sel=q>0?'selected-adult':'';
        return `<div class="menu-btn ${sel}" id="mbtn-${p.id}-${m.id}">
          <div class="menu-btn-left">
            <div class="menu-btn-name">${m.label}</div>
            <div class="menu-btn-price">${fmt(m.price)}</div>
          </div>
          <div class="menu-qty" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="changeQty(${p.id},'${m.id}',-1)">−</button>
            <div class="qty-val" id="qty-${p.id}-${m.id}">${q}</div>
            <button class="qty-btn" onclick="changeQty(${p.id},'${m.id}',1)">＋</button>
          </div>
        </div>`;
      }).join('');

      const childMenuHtml=CHILD_MENUS.map(m=>{
        const q=qty[m.id]||0;
        const sel=q>0?'selected-child':'';
        return `<div class="menu-btn ${sel}" id="mbtn-${p.id}-${m.id}">
          <div class="menu-btn-left">
            <div class="menu-btn-name">${m.label}</div>
            <div class="menu-btn-price">${fmt(m.price)}</div>
          </div>
          <div class="menu-qty" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="changeQty(${p.id},'${m.id}',-1)">−</button>
            <div class="qty-val" id="qty-${p.id}-${m.id}">${q}</div>
            <button class="qty-btn" onclick="changeQty(${p.id},'${m.id}',1)">＋</button>
          </div>
        </div>`;
      }).join('');

      const cashSel = pay==='cash' ? 'selected-cash' : '';
      const paypaySel = pay==='paypay' ? 'selected-paypay' : '';
      const previewHtml = pax>0 ? `合計: <span>${fmt(amt)}</span>（${pax}名）` : '';

      // sub text under name
      let subText = 'タップしてメニューを選択';
      if(isDone){
        const menuSummary=MENUS.filter(m=>(p.qty[m.id]||0)>0).map(m=>`${m.label}×${p.qty[m.id]}`).join('・');
        const payLabel=p.status==='cash'?'現金':'PayPay';
        subText=`${menuSummary}　${fmt(calcAmt(p.qty))}　${payLabel} ✓`;
      }

      return `<div class="p-card${isDone?' done':''}${isActive?' active':''}" data-id="${p.id}">
        <div class="p-header" onclick="toggleCard(${p.id})">
          <div class="p-avatar">${isDone?'✓':esc(initial)}</div>
          <div class="p-info">
            <div class="p-name">${esc(p.name)}</div>
            <div class="p-sub">${subText}</div>
          </div>
          <div class="p-chevron">▾</div>
        </div>
        <div class="order-form">
          <div class="menu-section">
            <div class="menu-section-label">🧑 大人メニュー</div>
            <div class="menu-grid">${adultMenuHtml}</div>
          </div>
          <div class="menu-section">
            <div class="menu-section-label">🧒 子どもメニュー</div>
            <div class="menu-grid">${childMenuHtml}</div>
          </div>
          <div class="payment-section">
            <div class="form-label">💳 決済予定</div>
            <div class="payment-options">
              <div class="pay-opt ${cashSel}" id="pay-${p.id}-cash" onclick="selectPay(${p.id},'cash')">
                <div class="pay-opt-icon">💴</div>
                <div class="pay-opt-label">当日現金</div>
                <div class="pay-opt-sub">おつりなしで</div>
              </div>
              <div class="pay-opt ${paypaySel}" id="pay-${p.id}-paypay" onclick="selectPay(${p.id},'paypay')">
                <div class="pay-opt-icon">📱</div>
                <div class="pay-opt-label">PayPay</div>
                <div class="pay-opt-sub">事前に送金</div>
              </div>
            </div>
          </div>
          <div class="preview-amt" id="preview-${p.id}">${previewHtml}</div>
          <button class="done-btn" onclick="confirmOrder(${p.id})">入力完了</button>
        </div>
      </div>`;
    }).join('');
  }

  /* ── Init ── */
  async function init() {
    if(BIN_ID){
      document.getElementById('join-box').style.display='none';
      await load(false);
      startPolling();
    } else {
      document.getElementById('join-box').style.display='block';
      participants=[];
      render();
    }
  }
  init();
</script>
</body>
</html>
